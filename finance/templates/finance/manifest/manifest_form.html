{% extends 'finance/base.html' %}

{% block content %}
<div class="container-fluid px-4">
    
    <div class="page-header mt-3">
        <div>
            <h3><i class="bi bi-file-earmark-text"></i>{{ title }}</h3>
            <p>Formulir pencatatan data biaya dan status hutang manifest vendor.</p>
        </div>
        <a href="{% url 'manifest_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Kembali ke Daftar
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
        <div class="card-header bg-white py-3 border-bottom">
            <h6 class="m-0 fw-bold text-dark"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Formulir Data Manifest Vendor</h6>
        </div>
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="id_kategori" class="form-label fw-bold text-dark">Kategori / Rute *</label>
                        <select name="kategori" id="id_kategori" class="form-select border-0 bg-light" required>
                            {% for choice in form.kategori.field.choices %}
                            <option value="{{ choice.0 }}" {% if form.kategori.value == choice.0 %}selected{% endif %}>{{ choice.1 }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="id_tanggal_kirim" class="form-label fw-bold text-dark">Tanggal Kirim</label>
                        <input type="date" name="tanggal_kirim" id="id_tanggal_kirim" class="form-control"
                               value="{{ form.tanggal_kirim.value|date:'Y-m-d' }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_no_resi" class="form-label fw-bold text-dark">No Manifest / Resi *</label>
                        <input type="text" name="no_resi" id="id_no_resi" class="form-control" required
                               value="{{ form.no_resi.value|default:'' }}">
                    </div>
                </div>
                
                <div class="row g-3 mt-2">
                    <div class="col-md-12">
                        <label for="id_tujuan" class="form-label fw-bold text-dark">Tujuan Rute</label>
                        <input type="text" name="tujuan" id="id_tujuan" class="form-control"
                               value="{{ form.tujuan.value|default:'' }}">
                    </div>
                </div>
                
                <div class="row g-3 mt-2">
                    <div class="col-md-2">
                        <label for="id_koli" class="form-label fw-bold text-dark">Koli</label>
                        <input type="number" name="koli" id="id_koli" class="form-control"
                               value="{{ form.koli.value|default:0 }}">
                    </div>
                    <div class="col-md-2">
                        <label for="id_kg" class="form-label fw-bold text-dark">Berat (Kg)</label>
                        <input type="number" step="0.01" name="kg" id="id_kg" class="form-control"
                               value="{{ form.kg.value|default:0 }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_penerima" class="form-label fw-bold text-dark">Nama Vendor</label>
                        <input type="text" name="penerima" id="id_penerima" class="form-control"
                               value="{{ form.penerima.value|default:'' }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_tanggal_terima" class="form-label fw-bold text-dark">Tanggal Terima</label>
                        <input type="date" name="tanggal_terima" id="id_tanggal_terima" class="form-control"
                               value="{{ form.tanggal_terima.value|date:'Y-m-d' }}">
                    </div>
                </div>
                
                <hr class="opacity-10 my-4">
                <h6 class="fw-bold text-primary mb-3"><i class="bi bi-cash-coin me-2"></i>Detail Hutang & Pembayaran</h6>
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="id_total" class="form-label fw-bold text-dark">Total Hutang Vendor (Rp)</label>
                        <input type="number" name="total" id="id_total" class="form-control"
                               value="{{ form.total.value|default:0 }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_dp" class="form-label fw-bold text-dark">Uang Muka / DP (Rp)</label>
                        <input type="number" name="dp" id="id_dp" class="form-control"
                               value="{{ form.dp.value|default:0 }}">
                    </div>
                    <div class="col-md-4 d-flex align-items-center">
                        <div class="form-check mt-4 ms-2">
                            <input type="checkbox" name="status_bayar" id="id_status_bayar" class="form-check-input"
                                   {% if form.status_bayar.value %}checked{% endif %} style="cursor: pointer; transform: scale(1.15);">
                            <label for="id_status_bayar" class="form-check-label ms-2">
                                <strong class="text-success fs-6">Sudah Dibayar / Lunas</strong>
                            </label>
                        </div>
                    </div>
                </div>
                
                <hr class="opacity-10 my-4">
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'manifest_list' %}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-1"></i> Batal
                    </a>
                    <button type="submit" class="btn btn-primary px-5">
                        <i class="bi bi-save me-1"></i> Simpan Data Manifest
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
