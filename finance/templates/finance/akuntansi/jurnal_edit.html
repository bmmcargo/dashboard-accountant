{% extends 'finance/base.html' %} {% load crispy_forms_tags %} {% block content %}
<div class="container-fluid px-4">
  
  <div class="page-header mt-3">
    <div>
      <h3><i class="bi bi-pencil-square"></i>Edit Jurnal Umum</h3>
      <p>Perbarui detail data tanggal, uraian, akun, debit, atau kredit transaksi jurnal umum.</p>
    </div>
    <a href="{% url 'jurnal_list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> Kembali ke Daftar Jurnal
    </a>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
        <div class="card-header bg-white py-3 border-bottom">
          <h6 class="m-0 fw-bold text-dark"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Form Edit Data Jurnal</h6>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %} 
            {{ form|crispy }}

            <hr class="opacity-10 my-4">
            <div class="d-flex justify-content-end gap-2">
              <a href="{% url 'jurnal_list' %}" class="btn btn-outline-secondary px-4"><i class="bi bi-x-circle me-1"></i> Batal</a>
              <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i> Simpan Perubahan</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
